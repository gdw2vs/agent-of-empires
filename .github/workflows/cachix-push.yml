name: Push to Cachix

# Builds aoe-with-web (--features serve, web UI embedded) for Linux and macOS
# and pushes ALL store paths to Cachix so new hosts don't need to recompile
# anything -- not just the final binary but the Rust crate dependency layer too.
#
# Strategy:
#   1. cachix-action installs a post-build hook BEFORE the build so every path
#      built during `nix build` is pushed as it is produced.
#   2. After building, we explicitly push the full closure of all build inputs
#      via the .drv file. This catches paths that the runner had locally cached
#      and therefore never rebuilt (so the hook never fired for them).
#
# Requires two repository secrets set in the fork's Settings > Secrets:
#   CACHIX_AUTH_TOKEN  - from cachix.org (Settings > Auth Tokens)
#   CACHIX_CACHE_NAME  - your cache name (e.g. "gdw2vs")

on:
  push:
    branches: [main]
    paths:
      - 'flake.nix'
      - 'flake.lock'
      - 'src/**'
      - 'Cargo.toml'
      - 'Cargo.lock'
      - 'build.rs'
      # web/** is intentionally excluded: web/package-lock.json changes
      # trigger the "Update Nix npm Hash" workflow, which updates the
      # npmDepsHash in flake.nix. Building here before that hash is
      # committed races and fails with ENOTCACHED. The workflow_run
      # trigger below chains the cachix build after the hash update.
  # Also runs after the daily upstream sync so any new upstream release
  # is built and pushed to Cachix automatically.
  workflow_run:
    workflows: ["Update Nix npm Hash", "Sync from Upstream"]
    branches: [main]
    types: [completed]
  workflow_dispatch:

jobs:
  cachix:
    name: Build and push (${{ matrix.os }})
    # Skip when triggered by a failed hash-update run.
    if: >-
      github.event_name != 'workflow_run' ||
      github.event.workflow_run.conclusion == 'success'
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: nixbuild/nix-quick-install-action@2c9db80fb984ceb1bcaa77cdda3fdf8cfba92035 # v34

      # Must run BEFORE the build so the post-build hook captures every
      # derivation as it is built.
      - name: Set up Cachix
        uses: cachix/cachix-action@1eb2ef646ac0255473d23a5907ad7b04ce94065c # v17
        with:
          name: ${{ secrets.CACHIX_CACHE_NAME }}
          authToken: ${{ secrets.CACHIX_AUTH_TOKEN }}

      - name: Build aoe-with-web
        run: nix build .#aoe-with-web

      - name: Push all build inputs and outputs to Cachix
        # Query the .drv file for all input store paths (build-time deps like
        # crate artifacts, npm deps, toolchain) then push everything to Cachix.
        # This ensures paths already cached on the runner (not rebuilt, so not
        # seen by the post-build hook) are still pushed.
        run: |
          CACHE="${{ secrets.CACHIX_CACHE_NAME }}"
          SYSTEM=$(nix eval --raw --impure --expr 'builtins.currentSystem')
          DRV=$(nix path-info --derivation ".#packages.${SYSTEM}.aoe-with-web")

          # All inputs to the build (build-time: crates, toolchain, npm, etc.)
          nix-store --query --requisites "$DRV" \
            | cachix push "$CACHE"

          # All outputs (runtime closure: the binary + its runtime deps)
          nix-store --query --requisites ./result \
            | cachix push "$CACHE"
