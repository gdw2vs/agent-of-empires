name: Sync from Upstream

# Keeps this fork's main branch in sync with njbrake/agent-of-empires.
# Rebases any fork-specific commits (e.g. cachix-push.yml, this file) on top
# of upstream so upstream changes are always incorporated without merge commits.
#
# Other branches are unaffected -- only main is synced.

on:
  schedule:
    - cron: '0 6 * * *' # daily at 6am UTC
  workflow_dispatch:

jobs:
  sync:
    name: Rebase fork/main onto upstream
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: main
          fetch-depth: 0
          # A PAT with the `workflow` scope is required to push commits that
          # modify files under .github/workflows/. The default GITHUB_TOKEN
          # cannot be granted this permission. Falls back to GITHUB_TOKEN if
          # the secret is not set (push will fail for workflow-file changes).
          token: ${{ secrets.SYNC_PAT || secrets.GITHUB_TOKEN }}

      - name: Configure git identity
        run: |
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"

      - name: Add upstream remote
        run: git remote add upstream https://github.com/njbrake/agent-of-empires.git

      - name: Fetch upstream
        run: git fetch upstream main

      - name: Rebase onto upstream
        run: |
          if git merge-base --is-ancestor upstream/main HEAD; then
            echo "Fork is already up to date with upstream."
            exit 0
          fi

          # Rebase any fork-specific commits on top of upstream main.
          # This keeps fork-only changes (e.g. cachix-push.yml, sync-upstream.yml)
          # without creating merge commits, while incorporating all upstream changes.
          git rebase upstream/main
          git push origin main --force-with-lease
          echo "Rebased fork/main onto upstream at $(git rev-parse --short HEAD)"
