name: Sync from Upstream

# Keeps this fork's main branch in sync with njbrake/agent-of-empires.
# Uses GitHub's merge-upstream API, which works with the default GITHUB_TOKEN
# (no PAT needed) and handles workflow file changes that git push cannot.
#
# Fork-only commits (e.g. cachix-push.yml, this file) are preserved via merge.
# Other branches are unaffected.

on:
  schedule:
    - cron: '0 6 * * *' # daily at 6am UTC
  workflow_dispatch:

jobs:
  sync:
    name: Sync fork with upstream
    runs-on: ubuntu-latest

    steps:
      - name: Merge upstream into fork
        run: |
          response=$(gh api repos/${{ github.repository }}/merge-upstream \
            -f branch=main 2>&1) || true
          echo "$response"

          # The API returns merge_type: "none" when already up to date,
          # "fast-forward" or "merge" on success.
          if echo "$response" | grep -q '"merge_type"'; then
            echo "Sync complete."
          else
            echo "::error::Failed to sync from upstream"
            exit 1
          fi
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
